<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FS22 Roleplay Vanilla</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>FS22 ROLEPLAY 100% VANILLA</h1>
        <p>Servidor Profesional | 123 Miembros</p>
    </header>

    <main>
        <section id="info">
            <h2>Nuestra Comunidad</h2>
            <p>Roleplay puro sin mods. El banco controla la industria y el comercio.</p>
        </section>

        <section id="staff">
            <h2>Postulación para Staff</h2>
            <form id="formularioStaff">
                <label for="nombre">Usuario de Discord:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Usuario#1234" required>

                <label for="edad">Edad:</label>
                <input type="number" id="edad" name="edad" required>

                <label for="experiencia">¿Por qué quieres ser staff?:</label>
                <textarea id="experiencia" name="experiencia" rows="4" required></textarea>

                <button type="submit" class="boton">Enviar a Discord</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 FS22 Vanilla RP</p>
    </footer>
<script src="script.js?v=1.1"></script>
</body>
</html>

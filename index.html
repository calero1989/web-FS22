<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación Staff - FS22</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚜 Postulación Staff FS22</h1>
        <p>Completa el formulario para enviar tu solicitud al equipo.</p>
        <form id="staffForm">
            <label for="username">Nombre en Discord:</label>
            <input type="text" id="username" name="username" placeholder="Ej: Juanito#1234" required>

            <label for="age">Edad:</label>
            <input type="number" id="age" name="age" required>

            <label for="experience">¿Tienes experiencia previa?:</label>
            <textarea id="experience" name="experience" rows="4" placeholder="Cuéntanos un poco..." required></textarea>

            <button type="submit">Enviar Postulación</button>
        </form>
        <div id="status"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
